<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTS Trade Guardian — Trade Journal</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ===== JOURNAL PAGE — compact, no empty space ===== */
    .journal-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 10px 14px 80px;
      position: relative;
      z-index: 1;
    }
    .journal-header { text-align:center; padding:8px 0 4px; }
    .journal-header h1 { font-size:22px; font-weight:900; color:#fff; }
    .journal-tab-bar { display:flex; background:#0d1117; border:1px solid rgba(240,165,0,.25); border-radius:14px; padding:4px; gap:4px; margin:8px 0; }
    .journal-tab-bar .tab-btn { flex:1; background:transparent; border:0; color:#8892a4; padding:7px 4px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; }
    .journal-tab-bar .tab-btn.active { color:#f0a500; background:rgba(240,165,0,.12); }
    .journal-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px; }
    .journal-stats .stat-item { background:#0d1117; border:1px solid #1e2a3a; border-radius:12px; padding:7px 8px; text-align:center; }
    .journal-stats .stat-label { font-size:10px; color:#8892a4; text-transform:uppercase; letter-spacing:.8px; }
    .journal-stats .stat-value { font-size:15px; font-weight:800; margin-top:2px; }
    .gold-streak-j { width:100%; height:2px; margin:4px 0 10px; background:linear-gradient(90deg,transparent,#f0a500,#ffd700,#f0a500,transparent); box-shadow:0 0 10px rgba(240,165,0,.8); border-radius:2px; }
    #tradeList { display:flex; flex-direction:column; gap:8px; }
    .journal-footer { text-align:center; font-size:10px; color:#8892a4; padding:12px 6px 4px; }
  </style>
</head>
<body>
  <canvas id="sparkle-canvas"></canvas>

  <div class="journal-wrap">
    <div class="journal-header">
      <h1>📋 Trade Journal</h1>
    </div>

    <div class="journal-tab-bar">
      <button class="tab-btn active" onclick="filterTrades('ALL', this)">All</button>
      <button class="tab-btn" onclick="filterTrades('Long', this)">Long</button>
      <button class="tab-btn" onclick="filterTrades('Short', this)">Short</button>
      <button class="tab-btn" onclick="filterTrades('Swing', this)">Swing</button>
    </div>

    <div class="journal-stats">
      <div class="stat-item"><div class="stat-label">Total Profit</div><div id="totalProfit" class="stat-value pos">+$0.00</div></div>
      <div class="stat-item"><div class="stat-label">Wins</div><div id="totalWins" class="stat-value pos">0</div></div>
      <div class="stat-item"><div class="stat-label">Losses</div><div id="totalLosses" class="stat-value neg">0</div></div>
    </div>

    <div class="gold-streak-j"></div>

    <div id="tradeList"><div class="spinner"></div></div>

    <div class="journal-footer">© 2026 CTS Cyber Solutions - All Rights Reserved.</div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" href="index.html"><span>🏠</span>Dashboard</a>
    <a class="nav-btn active" href="journal.html"><span>📋</span>Trade Journal</a>
    <a class="nav-btn" href="settings.html"><span>⚙️</span>Settings</a>
  </nav>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/journal.js"></script>
</body>
</html>
